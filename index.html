<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CHARGERS · FRC Team 5409 · Battery Tracker</title>
  <meta name="theme-color" content="#1B3A8C" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── STYLES ── */
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --blue:#384293;--black:#000000;
      --red:#C41E1E;--red-dark:#8B1010;
      --yellow:#F5C800;--green:#39FF14;
      --orange:#FF9933;
      --bg:#01021f;--surface:#0F1526;--surface2:#161E35;
      --border:#1E2D5A;--text:#E8ECF8;--muted:#5A6A99;
      --mono:'Share Tech Mono',monospace;--disp:'Oswald',sans-serif;--body:'Barlow Condensed',sans-serif;
    }
    html,body{background:var(--bg);height:100%;font-family:var(--body);color:var(--text);-webkit-tap-highlight-color:transparent;}
    .app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
    .hdr{background:var(--black);border-bottom:3px solid var(--yellow);position:sticky;top:0;z-index:100;}
    .hdr-inner{display:flex;align-items:center;padding:12px 16px;gap:15px;}
    .hdr-title{font-family:var(--disp);font-size:24px;font-weight:900;letter-spacing:1px;color:var(--yellow);line-height:1;}
    .hdr-subtitle {
      display: block;        /* Forces it to the next line */
      font-size: 1rem;       /* Makes it smaller (half the size of the main title) */
      font-weight: normal;   /* Optional: makes it look less "heavy" than the main title */
      color: #666;           /* Optional: dims the color slightly for better hierarchy */
    }
    .hdr-team{font-family:var(--disp);font-size:12px;color:#AAC0FF;letter-spacing:1px;text-transform:uppercase;}
    .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:71px;z-index:90;}
    .tab{flex:1;padding:14px 5px;font-family:var(--disp);font-size:13px;font-weight:600;text-transform:uppercase;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;}
    .tab.on{color:var(--yellow);border-bottom-color:var(--yellow);background:rgba(245,200,0,0.05);}
    .pg{padding:16px;flex:1;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:20px;overflow:hidden;}
    .ch{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2);}
    .ct{font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--yellow);}
    .cb{padding:16px;}
    .bi{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .bid{font-family:var(--disp);font-size:18px;font-weight:700;}
    .bsub{font-family:var(--mono);font-size:11px;color:var(--muted);}
    .btn-qr{background:var(--blue);color:white;border:none;padding:6px 12px;border-radius:3px;font-family:var(--disp);font-size:11px;cursor:pointer;}
    .btn-d{color:var(--red);background:none;border:none;font-size:11px;cursor:pointer;font-family:var(--disp);}
    .inp{width:100%;background:#070B16;border:1px solid var(--border);border-radius:3px;padding:12px;color:var(--text);font-family:var(--mono);margin-bottom:10px;}
    .btn-p{width:100%;background:var(--blue);color:white;border:none;padding:14px;font-family:var(--disp);font-size:14px;font-weight:700;text-transform:uppercase;border-radius:3px;cursor:pointer;}
    .st{background:#070B16;padding:10px;border:1px solid var(--border);border-radius:2px;}
    .sl{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;}
    .sv{font-family:var(--mono);font-size:14px;font-weight:600;}
    .back-btn{background:none;border:none;color:var(--yellow);padding:10px 16px;font-family:var(--disp);cursor:pointer;}
    table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
    th{text-align:left;color:var(--muted);padding:8px;border-bottom:1px solid var(--border);font-size:10px;}
    td{padding:10px 8px;border-bottom:1px solid var(--border);}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    // ── FIREBASE CONFIG ──
    const firebaseConfig = { 
      apiKey: "AIzaSyAsP6CNH0Eqhc93hqn2fOwTUlQhff-lAOk",
      authDomain: "battery-tracker-5409.firebaseapp.com",
      projectId: "battery-tracker-5409",
      storageBucket: "battery-tracker-5409.firebasestorage.app",
      messagingSenderId: "48524347",
      appId: "1:48524347:web:1cf4503c4f229f5b09401e"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const Delta = ({a, b}) => {
      if(!a || !b) return null;
      const val = (parseFloat(b) - parseFloat(a)).toFixed(2);
      const isPos = val > 0;
      return <div style={{fontSize:9, color: isPos ? 'var(--green)' : 'var(--red)', fontFamily:'var(--mono)'}}>{isPos ? '+' : ''}{val}</div>;
    };

    const App = () => {
      const [page, setPage] = React.useState("home");
      const [tab, setTab] = React.useState("pre");
      const [batteries, setBatteries] = React.useState([]);
      const [records, setRecords] = React.useState([]);
      const [events, setEvents] = React.useState([]);
      const [activeEvent, setActiveEvent] = React.useState(null);
      const [pre, setPre] = React.useState({ match:'', bat:'', v:'', pct:'', ir:'' });

      React.useEffect(() => {
        const u1 = db.collection("batteries").onSnapshot(s => setBatteries(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const u2 = db.collection("records").onSnapshot(s => setRecords(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const u3 = db.collection("events").orderBy("timestamp", "desc").onSnapshot(s => setEvents(s.docs.map(d => ({id: d.id, ...d.data()}))));
        return () => { u1(); u2(); u3(); };
      }, []);

      const handleAddBattery = () => {
        const n = prompt("Battery Name (e.g. B1):");
        if(n) db.collection("batteries").doc(n.toUpperCase().trim()).set({ added: Date.now() });
      };

      const handleAddEvent = () => {
        const n = prompt("Event Name:");
        if(n) db.collection("events").add({ name: n, timestamp: Date.now() });
      };

      const savePre = () => {
        if(!pre.match || !pre.bat || !pre.v) return alert("Missing Info");
        db.collection("records").add({
          match: pre.match, bat: pre.bat, eventId: activeEvent.id,
          pre: { v: pre.v, pct: pre.pct, ir: pre.ir },
          timestamp: Date.now()
        });
        setPre({ match:'', bat:'', v:'', pct:'', ir:'' });
        setTab("history");
      };

      const eventRecords = records.filter(r => r.eventId === activeEvent?.id);

      return (
        <div className="app">
          <div className="hdr">
            <div className="hdr-inner">
              <img 
                src="https://lh3.googleusercontent.com/sitesv/APaQ0SQO-Q1y6sjLYChCDTlFQ-tvOaOLQJMLzwTbzHUJPPVwmoRv1prFl-ujmWgAok3K1bdeGFLb6l28K5Qqh5qXcN0u4qfz0UXOVBSx6o2bhYv3GM5sI1lrMLu1NlEnd0ksUbXi_foSOwka8sm5GBxH6ywM6tjzneeXsUk=w16383" 
                alt="Logo"
                width = "50"
                height = "50"
                className="hdr-logo" />
              <div className="hdr-title">
                5409 CHARGERS ⚡ 
                <span className="hdr-subtitle">BATTERY TRACKER</span>
              </div>
            </div>
          </div>

          {page === "home" ? (
            <div className="pg">
              <div className="card">
                <div className="ch"><div className="ct">Batteries</div><button className="btn-qr" onClick={handleAddBattery}>+ Add</button></div>
                <div className="cb" style={{padding:0}}>
                  {batteries.sort((a,b)=>a.id.localeCompare(b.id, undefined, {numeric:true})).map(b => (
                    <div key={b.id} className="bi">
                      <div className="bid">{b.id}</div>
                      <button className="btn-d" onClick={() => db.collection("batteries").doc(b.id).delete()}>Delete</button>
                    </div>
                  ))}
                </div>
              </div>

              <div className="card">
                <div className="ch"><div className="ct">Event Folders</div><button className="btn-qr" onClick={handleAddEvent}>+ New</button></div>
                <div className="cb" style={{padding:0}}>
                  {events.map(ev => (
                    <div key={ev.id} className="bi" onClick={() => { setActiveEvent(ev); setPage("event"); }}>
                      <div className="bid">📁 {ev.name}</div>
                      <button className="btn-d" onClick={(e) => {e.stopPropagation(); db.collection("events").doc(ev.id).delete();}}>Delete</button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ) : (
            <div style={{display:'flex', flexDirection:'column', flex:1}}>
              <button className="back-btn" onClick={() => setPage("home")}>← BACK</button>
              <div className="tabs">
                {["pre", "post", "history", "stats"].map(t => (
                  <button key={t} className={`tab ${tab === t ? 'on' : ''}`} onClick={() => setTab(t)}>{t}</button>
                ))}
              </div>
              <div className="pg">
                {tab === "pre" && (
                  <div className="card"><div className="cb">
                    <input className="inp" type="number" placeholder="Match #" value={pre.match} onChange={e=>setPre({...pre, match:e.target.value})}/>
                    <select className="inp" value={pre.bat} onChange={e=>setPre({...pre, bat:e.target.value})}>
                      <option value="">-- Select Battery --</option>
                      {batteries.map(b => <option key={b.id} value={b.id}>{b.id}</option>)}
                    </select>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:10}}>
                      <input className="inp" placeholder="V" type="number" value={pre.v} onChange={e=>setPre({...pre, v:e.target.value})}/>
                      <input className="inp" placeholder="Charge %" type="number" value={pre.pct} onChange={e=>setPre({...pre, pct:e.target.value})}/>
                      <input className="inp" placeholder="IR" type="number" value={pre.ir} onChange={e=>setPre({...pre, ir:e.target.value})}/>
                    </div>
                    <button className="btn-p" onClick={savePre}>Save Pre-Match</button>
                  </div></div>
                )}
                {tab === "post" && (
                  <div>
                    {eventRecords.filter(r => !r.post).map(r => (
                      <PostMatchForm key={r.id} record={r} onSave={(id, data) => db.collection("records").doc(id).update({ post: data })} />
                    ))}
                  </div>
                )}
                {tab === "history" && (
                  <div>
                    {eventRecords.sort((a,b)=>b.timestamp-a.timestamp).map(r => (
                      <div key={r.id} className="card">
                        <div className="ch"><div className="bid">Match {r.match}</div><div className="ct">{r.bat}</div></div>
                        <div className="cb" style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:10}}>
                          <div className="st"><div className="sl">V</div><div className="sv">{r.pre.v}→{r.post?.v||'-'}</div><Delta a={r.pre.v} b={r.post?.v}/></div>
                          <div className="st"><div className="sl">%</div><div className="sv">{r.pre.pct}→{r.post?.pct||'-'}</div><Delta a={r.pre.pct} b={r.post?.pct}/></div>
                          <div className="st"><div className="sl">IR</div><div className="sv">{r.pre.ir}→{r.post?.ir||'-'}</div><Delta a={r.pre.ir} b={r.post?.ir}/></div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {tab === "stats" && <StatsTab batteries={batteries} records={eventRecords} />}
              </div>
            </div>
          )}
        </div>
      );
    };

    const PostMatchForm = ({record, onSave}) => {
      const [v, setV] = React.useState('');
      const [pct, setPct] = React.useState('');
      const [ir, setIr] = React.useState('');
      return (
        <div className="card">
          <div className="ch"><div className="ct">Post-Match: {record.match}</div></div>
          <div className="cb">
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:10}}>
              <input className="inp" placeholder="V" type="number" value={v} onChange={e=>setV(e.target.value)}/>
              <input className="inp" placeholder="%" type="number" value={pct} onChange={e=>setPct(e.target.value)}/>
              <input className="inp" placeholder="IR" type="number" value={ir} onChange={e=>setIr(e.target.value)}/>
            </div>
            <button className="btn-p" onClick={() => onSave(record.id, {v, pct, ir})}>Submit</button>
          </div>
        </div>
      );
    };

    const StatsTab = ({batteries, records}) => (
      <div className="card">
        <div className="ch"><div className="ct">Analytics</div></div>
        <div className="cb" style={{padding:0}}>
          <table>
            <thead><tr><th>ID</th><th>Matches</th><th>Avg Drop (V)</th></tr></thead>
            <tbody>
              {batteries.map(b => {
                const bRecs = records.filter(r => r.bat === b.id && r.post);
                if (bRecs.length === 0) return null;
                const avg = (bRecs.reduce((acc, r) => acc + (parseFloat(b.id === 'placeholder' ? 0 : r.post.v) - parseFloat(r.pre.v)), 0) / bRecs.length).toFixed(2);
                const isGain = avg > 0;
                return (
                  <tr key={b.id}>
                    <td>{b.id}</td><td>{bRecs.length}</td>
                    <td style={{color: isGain ? 'var(--green)' : 'var(--red)'}}>{isGain ? '+' : ''}{avg}V</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
