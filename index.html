<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CHARGERS · FRC Team 5409 · Battery Tracker</title>
  <meta name="theme-color" content="#1B3A8C" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── STYLES ── */
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --blue:#384293;--black:#000000;
      --red:#FF4D4D;--red-dark:#8B1010;
      --yellow:#F5C800;--green:#39FF14;
      --orange:#FF9933;
      --bg:#01021f;--surface:#0F1526;--surface2:#161E35;
      --border:#1E2D5A;--text:#E8ECF8;--muted:#5A6A99;
      --mono:'Share Tech Mono',monospace;--disp:'Oswald',sans-serif;--body:'Barlow Condensed',sans-serif;
    }
    html,body{background:var(--bg);height:100%;font-family:var(--body);color:var(--text);-webkit-tap-highlight-color:transparent;}
    .app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
    .hdr{background:var(--black);border-bottom:3px solid var(--yellow);position:sticky;top:0;z-index:100;}
    .hdr-inner{display:flex;align-items:center;padding:12px 16px;gap:15px;}
    .hdr-title{font-family:var(--disp);font-size:24px;font-weight:900;letter-spacing:1px;color:var(--yellow);line-height:1;}
    .hdr-subtitle { display: block; font-size: 1rem; font-weight: normal; color: #666; }
    .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:71px;z-index:90;}
    .tab{flex:1;padding:14px 5px;font-family:var(--disp);font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;}
    .tab.on{color:var(--yellow);border-bottom-color:var(--yellow);background:rgba(245,200,0,0.05);}
    .pg{padding:16px;flex:1;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:20px;overflow:hidden;}
    .ch{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2);}
    .ct{font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--yellow);}
    .cb{padding:16px;}
    .bi{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .bid{font-family:var(--disp);font-size:18px;font-weight:700;}
    .btn-qr{background:var(--blue);color:white;border:none;padding:6px 12px;border-radius:3px;font-family:var(--disp);font-size:11px;cursor:pointer;}
    .btn-d{color:var(--red);background:none;border:none;font-size:11px;cursor:pointer;font-family:var(--disp);}
    .inp{width:100%;background:#070B16;border:1px solid var(--border);border-radius:3px;padding:12px;color:var(--text);font-family:var(--mono);margin-bottom:10px;outline:none;}
    .btn-p{width:100%;background:var(--blue);color:white;border:none;padding:14px;font-family:var(--disp);font-size:14px;font-weight:700;text-transform:uppercase;border-radius:3px;cursor:pointer;}
    .st{background:#070B16;padding:10px;border:1px solid var(--border);border-radius:2px;}
    .sl{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;}
    .sv{font-family:var(--mono);font-size:14px;font-weight:600;}
    .back-btn{background:none;border:none;color:var(--yellow);padding:10px 16px;font-family:var(--disp);cursor:pointer;font-weight:700;}
    
    /* Stats Panels */
    .stat-panel{background:rgba(22, 30, 53, 0.6);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;}
    .stat-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;}
    .stat-bat-id{font-family:var(--disp);font-size:28px;font-weight:900;line-height:1;color:var(--text);}
    .stat-usage{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .stat-box{background:rgba(7, 11, 22, 0.5);padding:10px;border-radius:4px;border-left:3px solid var(--blue);}
    .stat-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
    .stat-value{font-family:var(--disp);font-size:18px;font-weight:700;}
    
    table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
    th{text-align:left;color:var(--muted);padding:12px 8px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;}
    td{padding:12px 8px;border-bottom:1px solid var(--border);}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const firebaseConfig = { 
      apiKey: "AIzaSyAsP6CNH0Eqhc93hqn2fOwTUlQhff-lAOk",
      authDomain: "battery-tracker-5409.firebaseapp.com",
      projectId: "battery-tracker-5409",
      storageBucket: "battery-tracker-5409.firebasestorage.app",
      messagingSenderId: "48524347",
      appId: "1:48524347:web:1cf4503c4f229f5b09401e"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const Delta = ({a, b}) => {
      if(!a || !b) return null;
      const val = (parseFloat(b) - parseFloat(a)).toFixed(2);
      const isPos = val > 0;
      return <div style={{fontSize:9, color: isPos ? 'var(--green)' : 'var(--red)', fontFamily:'var(--mono)'}}>{isPos ? '+' : ''}{val}</div>;
    };

    const App = () => {
      const [page, setPage] = React.useState("home");
      const [tab, setTab] = React.useState("pre");
      const [batteries, setBatteries] = React.useState([]);
      const [records, setRecords] = React.useState([]);
      const [events, setEvents] = React.useState([]);
      const [activeEvent, setActiveEvent] = React.useState(null);
      const [pre, setPre] = React.useState({ match:'', bat:'', v:'', pct:'', ir:'' });

      React.useEffect(() => {
        const u1 = db.collection("batteries").onSnapshot(s => setBatteries(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const u2 = db.collection("records").onSnapshot(s => setRecords(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const u3 = db.collection("events").orderBy("timestamp", "desc").onSnapshot(s => setEvents(s.docs.map(d => ({id: d.id, ...d.data()}))));
        return () => { u1(); u2(); u3(); };
      }, []);

      const sortedBats = [...batteries].sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
      const eventRecords = records.filter(r => r.eventId === activeEvent?.id);

      const savePre = () => {
        if(!pre.match || !pre.bat || !pre.v) return alert("Missing Info");
        db.collection("records").add({
          match: pre.match, bat: pre.bat, eventId: activeEvent.id,
          pre: { v: pre.v, pct: pre.pct, ir: pre.ir },
          timestamp: Date.now()
        });
        setPre({ match:'', bat:'', v:'', pct:'', ir:'' });
        setTab("history");
      };

      return (
        <div className="app">
          <div className="hdr">
            <div className="hdr-inner">
              <img src="ChargersLogo.png" alt="Chargers Logo" width="50" height="50" />
              <div className="hdr-title">5409 CHARGERS ⚡ <span className="hdr-subtitle">BATTERY TRACKER</span></div>
            </div>
          </div>

          {page === "home" ? (
            <div className="pg">
              <div className="card">
                <div className="ch"><div className="ct">🔋 Batteries</div><button className="btn-qr" onClick={() => {const n = prompt("Name:"); if(n) db.collection("batteries").doc(n.toUpperCase().trim()).set({added: Date.now()})}}>+ Add</button></div>
                <div className="cb" style={{padding:0}}>
                  {sortedBats.map(b => (
                    <div key={b.id} className="bi">
                      <div className="bid">{b.id}</div>
                      <button className="btn-d" onClick={() => confirm(`Delete ${b.id}?`) && db.collection("batteries").doc(b.id).delete()}>Delete</button>
                    </div>
                  ))}
                </div>
              </div>
              <div className="card">
                <div className="ch"><div className="ct">📁 Event Folders</div><button className="btn-qr" onClick={() => {const n = prompt("Name:"); if(n) db.collection("events").add({name: n, timestamp: Date.now()})}}>+ New</button></div>
                <div className="cb" style={{padding:0}}>
                  {events.map(ev => (
                    <div key={ev.id} className="bi" onClick={() => { setActiveEvent(ev); setPage("event"); }}>
                      <div className="bid">📁 {ev.name}</div>
                      <button className="btn-d" onClick={(e) => {e.stopPropagation(); confirm(`Delete ${ev.name}?`) && db.collection("events").doc(ev.id).delete();}}>Delete</button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ) : (
            <div style={{display:'flex', flexDirection:'column', flex:1}}>
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', paddingRight:16}}>
                <button className="back-btn" onClick={() => setPage("home")}>← BACK</button>
                <div style={{fontFamily:'var(--disp)', fontSize:'14px', color:'var(--yellow)', fontWeight:'bold'}}>📍 {activeEvent?.name}</div>
              </div>
              <div className="tabs">
                {[{id:"pre", label:"📋 PRE"}, {id:"post", label:"⌛ POST"}, {id:"history", label:"📊 HISTORY"}, {id:"stats", label:"📈 STATS"}].map(t => (
                  <button key={t.id} className={`tab ${tab === t.id ? 'on' : ''}`} onClick={() => setTab(t.id)}>{t.label}</button>
                ))}
              </div>
              <div className="pg">
                {tab === "pre" && (
                  <div className="card"><div className="cb">
                    <input className="inp" type="number" placeholder="Match #" value={pre.match} onChange={e=>setPre({...pre, match:e.target.value})}/>
                    <select className="inp" value={pre.bat} onChange={e=>setPre({...pre, bat:e.target.value})}>
                      <option value="">-- Select Battery --</option>
                      {sortedBats.map(b => <option key={b.id} value={b.id}>{b.id}</option>)}
                    </select>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10}}>
                      <input className="inp" placeholder="V" type="number" step="0.01" value={pre.v} onChange={e=>setPre({...pre, v:e.target.value})}/>
                      <input className="inp" placeholder="%" type="number" value={pre.pct} onChange={e=>setPre({...pre, pct:e.target.value})}/>
                      <input className="inp" placeholder="IR" type="number" step="0.01" value={pre.ir} onChange={e=>setPre({...pre, ir:e.target.value})}/>
                    </div>
                    <button className="btn-p" onClick={savePre}>Save Pre-Match</button>
                  </div></div>
                )}
                {tab === "post" && (
                  <div>
                    {eventRecords.filter(r => !r.post).map(r => (
                      <div key={r.id} className="card">
                        <div className="ch"><div className="ct">Post-Match: {r.bat} (M{r.match})</div></div>
                        <div className="cb">
                          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:10}}>
                            <input id={`v-${r.id}`} className="inp" placeholder="V" type="number" step="0.01" />
                            <input id={`p-${r.id}`} className="inp" placeholder="%" type="number" />
                            <input id={`i-${r.id}`} className="inp" placeholder="IR" type="number" step="0.01" />
                          </div>
                          <button className="btn-p" onClick={() => {
                            const v = document.getElementById(`v-${r.id}`).value;
                            const pct = document.getElementById(`p-${r.id}`).value;
                            const ir = document.getElementById(`i-${r.id}`).value;
                            db.collection("records").doc(r.id).update({ post: {v, pct, ir} });
                          }}>Submit</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {tab === "history" && (
                  <div>
                    {eventRecords.sort((a,b)=>b.timestamp-a.timestamp).map(r => (
                      <div key={r.id} className="card">
                        <div className="ch"><div className="bid">Match {r.match}</div><div className="ct">{r.bat}</div></div>
                        <div className="cb" style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:8}}>
                          <div className="st"><div className="sl">V</div><div className="sv">{r.pre.v}→{r.post?.v||'-'}</div><Delta a={r.pre.v} b={r.post?.v}/></div>
                          <div className="st"><div className="sl">%</div><div className="sv">{r.pre.pct}→{r.post?.pct||'-'}</div><Delta a={r.pre.pct} b={r.post?.pct}/></div>
                          <div className="st"><div className="sl">IR</div><div className="sv">{r.pre.ir}→{r.post?.ir||'-'}</div><Delta a={r.pre.ir} b={r.post?.ir}/></div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {tab === "stats" && <StatsTab batteries={sortedBats} records={eventRecords} />}
              </div>
            </div>
          )}
        </div>
      );
    };

    const StatsTab = ({batteries, records}) => {
      const valid = records.filter(r => r.post);
      
      const avg = (arr, key, isPost = true) => {
        if (!arr.length) return 0;
        return arr.reduce((acc, r) => acc + parseFloat((isPost ? r.post[key] : r.pre[key]) || 0), 0) / arr.length;
      };

      const avgDrop = (arr, key) => {
        if (!arr.length) return 0;
        return arr.reduce((acc, r) => acc + (parseFloat(r.post[key] || 0) - parseFloat(r.pre[key] || 0)), 0) / arr.length;
      };

      const healthRanking = batteries.map(b => {
        const bRecs = records.filter(r => r.bat === b.id).sort((a,b) => b.timestamp - a.timestamp);
        const ir = bRecs.length ? parseFloat(bRecs[0].post?.ir || bRecs[0].pre.ir || 0) : 0;
        return { id: b.id, ir };
      }).filter(b => b.ir > 0).sort((a, b) => a.ir - b.ir);

      return (
        <div style={{display:'flex', flexDirection:'column', gap:20}}>
          
          <div className="section-title" style={{fontFamily:'var(--disp)', color:'var(--yellow)', fontSize:12, letterSpacing:1}}>BATTERY OVERVIEW</div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
            <div className="st" style={{textAlign:'center', padding:'15px 10px'}}><div className="sl">Complete Matches</div><div className="sv" style={{fontSize:24}}>{valid.length}</div></div>
            <div className="st" style={{textAlign:'center', padding:'15px 10px'}}><div className="sl">Avg Post-Match V</div><div className="sv" style={{fontSize:24, color:'var(--green)'}}>{avg(valid, 'v').toFixed(2)}V</div></div>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10}}>
            <div className="st" style={{textAlign:'center'}}><div className="sl">Avg V Drop</div><div className="sv" style={{color:'var(--red)'}}>{avgDrop(valid, 'v').toFixed(2)}V</div></div>
            <div className="st" style={{textAlign:'center'}}><div className="sl">Avg % Used</div><div className="sv" style={{color:'var(--orange)'}}>{Math.abs(avgDrop(valid, 'pct')).toFixed(0)}%</div></div>
            <div className="st" style={{textAlign:'center'}}><div className="sl">Avg Post IR</div><div className="sv">{avg(valid, 'ir').toFixed(1)}</div></div>
          </div>

          <div className="section-title" style={{fontFamily:'var(--disp)', color:'var(--yellow)', fontSize:12, letterSpacing:1}}>BATTERY COMPARISON</div>
          <div className="card" style={{padding:0}}>
            <table>
              <thead><tr><th>ID</th><th>AVG ΔV</th><th>AVG Δ%</th><th>LAST IR</th></tr></thead>
              <tbody>
                {batteries.map(b => {
                  const bRecs = valid.filter(r => r.bat === b.id);
                  if(!bRecs.length) return null;
                  const v = avgDrop(bRecs, 'v').toFixed(2);
                  const p = avgDrop(bRecs, 'pct').toFixed(0);
                  const lastIR = [...bRecs].sort((a,b)=>b.timestamp-a.timestamp)[0].post.ir;
                  return (
                    <tr key={b.id}>
                      <td style={{fontWeight:'bold'}}>{b.id}</td>
                      <td style={{color: v < 0 ? 'var(--red)' : 'var(--green)'}}>{v}V</td>
                      <td style={{color: p < 0 ? 'var(--red)' : 'var(--green)'}}>{p}%</td>
                      <td>{lastIR}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div className="section-title" style={{fontFamily:'var(--disp)', color:'var(--yellow)', fontSize:12, letterSpacing:1}}>BATTERY DEEP DIVE</div>
          {batteries.map(b => {
            const bRecs = valid.filter(r => r.bat === b.id);
            if (!bRecs.length) return null;
            const v = avgDrop(bRecs, 'v').toFixed(2);
            const p = avgDrop(bRecs, 'pct').toFixed(1);
            return (
              <div key={b.id} className="stat-panel">
                <div className="stat-header"><div className="stat-bat-id">{b.id}</div><div className="stat-usage">{bRecs.length} Matches</div></div>
                <div className="stat-grid">
                  <div className="stat-box"><div className="stat-label">Avg V Drop</div><div className="stat-value" style={{color: v < 0 ? 'var(--red)' : 'var(--green)'}}>{v}V</div></div>
                  <div className="stat-box" style={{borderLeftColor:'var(--orange)'}}><div className="stat-label">Avg % Drop</div><div className="stat-value" style={{color: p < 0 ? 'var(--red)' : 'var(--green)'}}>{p}%</div></div>
                </div>
              </div>
            );
          })}

          <div className="section-title" style={{fontFamily:'var(--disp)', color:'var(--yellow)', fontSize:12, letterSpacing:1}}>HEALTH RANKING (LOWEST IR)</div>
          <div className="card">
            {healthRanking.map((rank, i) => (
              <div key={rank.id} className="bi" style={{background: i === 0 ? 'rgba(57, 255, 20, 0.05)' : 'none'}}>
                <div style={{display:'flex', alignItems:'center', gap:15}}>
                  <div style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--muted)'}}>#{i+1}</div>
                  <div className="bid">{rank.id}</div>
                </div>
                <div style={{textAlign:'right'}}><div className="sl">LATEST IR</div><div className="sv" style={{color: i===0?'var(--green)':'var(--text)'}}>{rank.ir} mΩ</div></div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
